name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token; no job in this workflow writes to the repo.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Secret scan FIRST, on the pristine checkout (tracked files only) — before `pnpm install`
      # creates node_modules. The gitleaks *Action* requires a paid GITLEAKS_LICENSE on GitHub
      # organizations (e.g. midt-bg); the gitleaks *binary* is free, so run the pinned CLI — it
      # works on the personal main repo and the org mirror alike, with no license.
      - name: Secret scan (gitleaks)
        env:
          GITLEAKS_VERSION: '8.30.1'
          # sha256 of gitleaks_8.30.1_linux_x64.tar.gz from the upstream release checksums.txt
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
        run: |
          curl -sSfL -o "$RUNNER_TEMP/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" dir . --redact --no-banner

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        # `pnpm audit` is broken upstream: npm retired its audit endpoints (HTTP 410 as of
        # 2026-07-15) and pnpm - including 11.x - still calls them. Scan the lockfile against
        # OSV.dev instead (covers GHSA, which includes the npm advisory database). Stricter than
        # the previous `--audit-level=high`: ANY known vulnerability fails the build; intentional
        # exceptions are recorded in an osv-scanner.toml config, per the OSV-Scanner docs.
        env:
          # https://github.com/google/osv-scanner/releases/tag/v2.4.0
          OSV_SCANNER_VERSION: '2.4.0'
          # sha256 of osv-scanner_linux_amd64 from the upstream release osv-scanner_SHA256SUMS
          OSV_SCANNER_SHA256: '15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0'
        run: |
          curl -sSfL -o "$RUNNER_TEMP/osv-scanner" \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  $RUNNER_TEMP/osv-scanner" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/osv-scanner"
          "$RUNNER_TEMP/osv-scanner" scan source -L pnpm-lock.yaml
      - name: Lint
        # Blocking: the repo-wide `pnpm format` pass cleared the pre-existing prettier debt, so
        # `pnpm lint` (prettier --check .) now gates merges and keeps the tree formatted (#88).
        run: pnpm lint
      # Run regardless of a Lint failure so a formatting nit doesn't mask the type/test signal — all
      # three checks report in one run. `!cancelled()` still skips them if the run is cancelled.
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: pnpm typecheck
      - name: Test
        if: ${{ !cancelled() }}
        run: pnpm test
      # Docs integrity (#102): fail on a dangling docs reference in source or an
      # unindexed doc. The checker self-tests first, so the gate is itself gated.
      - name: Docs integrity
        if: ${{ !cancelled() }}
        run: |
          pnpm check:docs:test
          pnpm check:docs
