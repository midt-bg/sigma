name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token; the only write anywhere is the coverage-comment
# job's pull-requests:write, scoped to that job (and it never runs for fork PRs).
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Secret scan FIRST, on the pristine checkout (tracked files only) — before `pnpm install`
      # creates node_modules. The gitleaks *Action* requires a paid GITLEAKS_LICENSE on GitHub
      # organizations (e.g. midt-bg); the gitleaks *binary* is free, so run the pinned CLI — it
      # works on the personal main repo and the org mirror alike, with no license.
      - name: Secret scan (gitleaks)
        env:
          GITLEAKS_VERSION: '8.30.1'
          # sha256 of gitleaks_8.30.1_linux_x64.tar.gz from the upstream release checksums.txt
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
        run: |
          curl -sSfL -o "$RUNNER_TEMP/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" dir . --redact --no-banner

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        # `pnpm audit` is broken upstream: npm retired its audit endpoints (HTTP 410 as of
        # 2026-07-15) and pnpm - including 11.x - still calls them. Scan the lockfile against
        # OSV.dev instead (covers GHSA, which includes the npm advisory database). Stricter than
        # the previous `--audit-level=high`: ANY known vulnerability fails the build; intentional
        # exceptions are recorded in an osv-scanner.toml config, per the OSV-Scanner docs.
        env:
          # https://github.com/google/osv-scanner/releases/tag/v2.4.0
          OSV_SCANNER_VERSION: '2.4.0'
          # sha256 of osv-scanner_linux_amd64 from the upstream release osv-scanner_SHA256SUMS
          OSV_SCANNER_SHA256: '15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0'
        run: |
          curl -sSfL -o "$RUNNER_TEMP/osv-scanner" \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          echo "${OSV_SCANNER_SHA256}  $RUNNER_TEMP/osv-scanner" | sha256sum -c -
          chmod +x "$RUNNER_TEMP/osv-scanner"
          "$RUNNER_TEMP/osv-scanner" scan source -L pnpm-lock.yaml
      - name: Lint
        # Blocking: the repo-wide `pnpm format` pass cleared the pre-existing prettier debt, so
        # `pnpm lint` (prettier --check .) now gates merges and keeps the tree formatted (#88).
        run: pnpm lint
      # Run regardless of a Lint failure so a formatting nit doesn't mask the type/test signal — all
      # three checks report in one run. `!cancelled()` still skips them if the run is cancelled.
      - name: Typecheck
        if: ${{ !cancelled() }}
        run: pnpm typecheck
      - name: Test
        if: ${{ !cancelled() }}
        run: pnpm test -- --coverage
      # Coverage ratchet (#93): per-workspace lines/branches may not drop below
      # coverage-baseline.json (0.5pp tolerance). The checker self-tests first,
      # so the gate is itself gated — same pattern as the docs check below.
      - name: Coverage ratchet
        if: ${{ !cancelled() }}
        run: |
          pnpm check:coverage:test
          pnpm check:coverage
      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          retention-days: 14
          path: |
            coverage-summary.md
            apps/*/coverage/coverage-summary.json
            packages/*/coverage/coverage-summary.json
      # Docs integrity (#102): fail on a dangling docs reference in source or an
      # unindexed doc. The checker self-tests first, so the gate is itself gated.
      - name: Docs integrity
        if: ${{ !cancelled() }}
        run: |
          pnpm check:docs:test
          pnpm check:docs

  # Sticky PR comment with the coverage table (#93). Same-repo PRs only: fork
  # PRs get a read-only token no matter what `permissions:` says, so for them
  # the table lives in the step summary + artifact instead. `always()` so the
  # comment still updates when the ratchet fails; continue-on-error so a
  # comment hiccup never gates a merge.
  coverage-comment:
    needs: check
    if: >-
      always() && github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
      - name: Sticky coverage comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ ! -f coverage-summary.md ]; then
            echo "coverage-summary.md missing from artifact; nothing to post"
            exit 0
          fi
          marker='<!-- coverage-report -->'
          # Two steps, not a pipeline: `gh api | head -1` under the runner's
          # default `pipefail` can surface gh's SIGPIPE (exit 141) as failure.
          gh api "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"${marker}\")) | .id" > comment-ids.txt
          existing=$(head -1 comment-ids.txt)
          if [ -n "$existing" ]; then
            gh api --method PATCH "repos/${GH_REPO}/issues/comments/${existing}" \
              -F body=@coverage-summary.md > /dev/null
            echo "updated comment ${existing}"
          else
            gh api --method POST "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
              -F body=@coverage-summary.md > /dev/null
            echo "created comment"
          fi
