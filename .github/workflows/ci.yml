name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default token; no job in this workflow writes to the repo.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Secret scan FIRST, on the pristine checkout (tracked files only) — before `pnpm install`
      # creates node_modules. The gitleaks *Action* requires a paid GITLEAKS_LICENSE on GitHub
      # organizations (e.g. midt-bg); the gitleaks *binary* is free, so run the pinned CLI — it
      # works on the personal main repo and the org mirror alike, with no license.
      - name: Secret scan (gitleaks)
        env:
          GITLEAKS_VERSION: "8.30.1"
          # sha256 of gitleaks_8.30.1_linux_x64.tar.gz from the upstream release checksums.txt
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl -sSfL -o "$RUNNER_TEMP/gitleaks.tar.gz" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  $RUNNER_TEMP/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/gitleaks.tar.gz" -C "$RUNNER_TEMP" gitleaks
          "$RUNNER_TEMP/gitleaks" dir . --redact --no-banner

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level=high
      - name: Lint
        continue-on-error: true
        # TODO: flip to blocking after a dedicated repo-wide `pnpm format` clears the
        # pre-existing prettier debt (mocks/, legacy scripts, root docs).
        run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
