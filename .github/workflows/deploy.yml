name: Deploy (web + etl → Cloudflare)

# Production deploys originate here, not from a developer machine (see AGENTS.md / README.md): the
# scoped Cloudflare credential lives only in repo secrets. Ships the v1 set — the SSR explorer
# (`sigma`) and the refresh Workflow (`sigma-etl`). The remote D1 must already be provisioned and its
# real database_id set in the wrangler configs (see docs/deploy.md). Fails clearly without secrets.
#
# Event → target mapping (see the `detect` job):
#   - version TAG (any repo)        → production   (cut a release: git tag v1.0.0 && git push <remote> v1.0.0)
#   - push to `main` on the MIRROR  → staging       (continuous staging on midt-bg/sigma-stage)
#   - workflow_dispatch             → the chosen environment (either repo)
# A tag deploys production from ANY repo, so the full release flow can be rehearsed end-to-end on the
# private `midt-bg/sigma-stage` mirror (prod is Access-gated / not public during this phase) before the
# real prod repo exists. A push to `main` on the main repo deploys nothing (prod stays tag-driven).
# (Re-add a `github.repository` guard once a dedicated prod repo owns releases. To deploy on GitHub
# *Releases* instead of tags, swap the tag trigger for `release: { types: [published] }`.)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        type: choice
        options:
          - staging
          - production
        default: staging

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        # Map the git event to a deploy target. Empty ("") => no deploy: the deploy job is skipped.
        #   workflow_dispatch              -> the chosen environment (either repo)
        #   tag v*  (any repo)             -> production   (mirror included, so the full release is rehearsable)
        #   push to main on the mirror     -> staging      (continuous staging)
        #   push to main on the main repo  -> nothing      (production stays tag-driven)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ github.repository }}" = "midt-bg/sigma-stage" ]; then
            echo "env=staging" >> "$GITHUB_OUTPUT"
          else
            echo "env=" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect
    if: needs.detect.outputs.env != ''
    runs-on: ubuntu-latest
    environment: ${{ needs.detect.outputs.env }}
    concurrency:
      group: deploy-${{ needs.detect.outputs.env }}
      cancel-in-progress: false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Real D1 database_id substituted into wrangler.deploy.* by scripts/wrangler-render.mjs
      # (committed wrangler.* hold a zero-UUID dummy). See docs/deploy.md.
      SIGMA_D1_ID: ${{ secrets.SIGMA_D1_ID }}
      SIGMA_WEB_NAME: ${{ vars.SIGMA_WEB_NAME }}
      SIGMA_ETL_NAME: ${{ vars.SIGMA_ETL_NAME }}
      SIGMA_WORKFLOW_NAME: ${{ vars.SIGMA_WORKFLOW_NAME }}
      SIGMA_D1_NAME: ${{ vars.SIGMA_D1_NAME }}
      SIGMA_CSV_CACHE_NAME: ${{ vars.SIGMA_CSV_CACHE_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Guard — require deploy credentials
        id: guard
        run: |
          missing=()
          [ -z "${CLOUDFLARE_API_TOKEN}" ] && missing+=("CLOUDFLARE_API_TOKEN")
          [ -z "${CLOUDFLARE_ACCOUNT_ID}" ] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [ -z "${SIGMA_D1_ID}" ]          && missing+=("SIGMA_D1_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing repo secrets: ${missing[*]} — cannot deploy."
            exit 1
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      # Non-prod deploys must use distinct resource names. An unset name var renders the PRODUCTION
      # default (so a misconfigured staging run would overwrite the live `sigma` worker) — fail loudly
      # instead. Skipped for production, which is meant to use the committed defaults. See docs/deploy.md.
      - name: Guard — non-prod must not reuse production resource names
        if: needs.detect.outputs.env != 'production'
        run: |
          fail=0
          check() {  # $1=value  $2=prod default  $3=var name
            if [ -z "$1" ] || [ "$1" = "$2" ]; then
              echo "::error::$3 must be a non-production value for env '${{ needs.detect.outputs.env }}' (got '${1:-<empty>}', prod default '$2') — set it as a GitHub Environment *variable*."
              fail=1
            fi
          }
          check "$SIGMA_WEB_NAME"       sigma           SIGMA_WEB_NAME
          check "$SIGMA_ETL_NAME"       sigma-etl       SIGMA_ETL_NAME
          check "$SIGMA_WORKFLOW_NAME"  sigma-refresh   SIGMA_WORKFLOW_NAME
          check "$SIGMA_D1_NAME"        sigma           SIGMA_D1_NAME
          check "$SIGMA_CSV_CACHE_NAME" sigma-csv-cache SIGMA_CSV_CACHE_NAME
          [ "$fail" = 0 ] || { echo "Refusing to deploy '${{ needs.detect.outputs.env }}' with production resource names."; exit 1; }

      - name: Typecheck
        if: steps.guard.outputs.ok == 'true'
        run: pnpm typecheck

      # `run deploy`, not `deploy` — bare `pnpm deploy` is a pnpm built-in, not our package script.
      - name: Deploy explorer (sigma)
        if: steps.guard.outputs.ok == 'true'
        run: pnpm --filter @sigma/web run deploy

      - name: Initialize LOG_IP_KEY secret if absent
        if: steps.guard.outputs.ok == 'true'
        run: |
          # LOG_IP_KEY is long-lived so IP HMAC tokens remain stable for same-client correlation.
          # Never overwrite it; a new blue-green worker name starts without a key and correlation
          # resets at full infra cutover, which is acceptable. The deploy token already has
          # Workers Scripts:Edit, so no separate Cloudflare token is required.
          if ! secrets_json="$(pnpm --filter @sigma/web exec wrangler secret list --name "$SIGMA_WEB_NAME" --format json)"; then
            echo "Skipping LOG_IP_KEY initialization: failed to list secrets for $SIGMA_WEB_NAME."
            exit 0
          fi

          set +e
          printf '%s' "$secrets_json" | node -e '
            const fs = require("fs");
            let secrets;
            try {
              secrets = JSON.parse(fs.readFileSync(0, "utf8"));
            } catch {
              process.exit(2);
            }
            if (!Array.isArray(secrets)) {
              process.exit(2);
            }
            process.exit(secrets.some((secret) => secret && secret.name === "LOG_IP_KEY") ? 0 : 1);
          '
          secret_status="$?"
          set -e

          if [ "$secret_status" = 0 ]; then
            echo "LOG_IP_KEY already exists for $SIGMA_WEB_NAME; leaving it unchanged."
            exit 0
          fi
          if [ "$secret_status" != 1 ]; then
            echo "Skipping LOG_IP_KEY initialization: unexpected secret list output for $SIGMA_WEB_NAME."
            exit 0
          fi

          key="$(openssl rand -hex 32)"
          printf '%s' "$key" | pnpm --filter @sigma/web exec wrangler secret put LOG_IP_KEY --name "$SIGMA_WEB_NAME"

      - name: Deploy refresh Workflow (sigma-etl)
        if: steps.guard.outputs.ok == 'true'
        run: pnpm --filter @sigma/etl run deploy
