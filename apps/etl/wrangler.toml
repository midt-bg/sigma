name = "sigma-etl"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Bundle the scoped re-derive script (scripts/refresh-slice.sql) as a text module the Workflow runs.
# fallthrough keeps wrangler's default text rules (.txt/.html) active alongside this one.
[[rules]]
type = "Text"
globs = ["**/*.sql"]
fallthrough = true

[dev]
port = 8789

# `database_id` is a zero-UUID placeholder for local dev (miniflare). `pnpm --filter @sigma/etl run
# deploy` substitutes SIGMA_D1_ID into wrangler.deploy.toml via scripts/wrangler-render.mjs.
[[d1_databases]]
binding = "DB"
database_name = "sigma"
database_id = "00000000-0000-0000-0000-000000000000"

# On-platform data refresh (replaces the GitHub cron). scheduled() kicks one durable Workflow run;
# the Queue fan-out for the TR full backfill is deferred (see docs/etl-pipeline.md).
[[workflows]]
binding = "REFRESH"
name = "sigma-refresh"
class_name = "RefreshWorkflow"

[triggers]
crons = ["0 */6 * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
