packages:
  - "apps/*"
  - "packages/*"

# pnpm 10 no longer reads the `pnpm` field from package.json ‚Äî overrides and
# onlyBuiltDependencies live here instead.
overrides:
  esbuild: 0.28.1
  # Security pins for dev/build-time transitive deps so CI `pnpm audit --audit-level=high`
  # passes. None of these ship to the Worker runtime.
  #   ws <8.21.0  ‚Äî memory-exhaustion DoS (GHSA-96hv-2xvq-fx4p), via wrangler‚Üíminiflare
  #   vite        ‚Äî server.fs.deny bypass (GHSA-fx2h-pf6j-xcff): v7 via @react-router/dev‚Üí
  #                 vite-node, v8 via apps/web + vitest. Patched per-major to avoid forcing
  #                 vite-node (which needs v7) onto v8.
  #   undici <7.28.0 ‚Äî DoS via WebSocket fragment-count bypass + SOCKS5 proxy pool reuse
  #                 (GHSA-vmh5-mc38-953g / -vxpw-j846-p89q / -hm92-r4w5-c3mj), via wrangler‚Üíminiflare.
  ws: "^8.21.0"
  vite@7: "^7.3.5"
  vite@8: "^8.0.16"
  undici: "^7.28.0"

onlyBuiltDependencies:
  - esbuild
  - workerd
  - sharp
